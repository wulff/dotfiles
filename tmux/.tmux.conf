# https://tao-of-tmux.readthedocs.io/en/latest/manuscript/09-status-bar.html
# https://github.com/tmux/tmux/wiki/Getting-Started#configuring-tmux
# https://github.com/Phantas0s/.dotfiles/blob/master/tmux/tmux.conf
# https://thevaluable.dev/tmux-config-mouseless/
# https://www.redhat.com/sysadmin/introduction-tmux-linux
# https://github.com/rothgar/awesome-tmux

# status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %H:%M %d-%b-%y"

# Use CTRL+space as prefix key.
unbind C-b
bind C-Space send-prefix
set -g prefix C-Space

# Use Vi key bindings to scroll.
#set-window-option -g mode-keys vi

# Use emacs key bindings.
set -g mode-keys emacs
set -g status-keys emacs

# Scrollback lines
set -g history-limit 100000

# Sane split commands.
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Shortcut to reload the configuration file.
bind r source-file ~/.tmux.conf \; display "Reloaded configuration!"

# Switch panes using ALT+arrow without prefix.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ...and add vim shortcuts as well.
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# Don't show hostname and clock.
set -g status-right ''

# Enable mouse control.
set -g mouse on

unbind a
bind a choose-tree -Zs

#### COLOUR (Solarized dark)
# https://github.com/seebi/tmux-colors-solarized/

set -g status-position top

# default statusbar colors
set-option -g status-style fg=yellow,bg=black #yellow and base02

# default window title colors
set-window-option -g window-status-style fg=brightblue,bg=default #base0 and default
#set-window-option -g window-status-style dim

# active window title colors
set-window-option -g window-status-current-style fg=brightred,bg=default #orange and default
#set-window-option -g window-status-current-style bright

# pane border
set-option -g pane-border-style fg=black #base02
set-option -g pane-active-border-style fg=brightgreen #base01

# message text
set-option -g message-style fg=brightred,bg=black #orange and base01

# pane number display
set-option -g display-panes-active-colour brightred #orange
set-option -g display-panes-colour blue #blue

# clock
set-window-option -g clock-mode-colour green #green

# bell
set-window-option -g window-status-bell-style fg=black,bg=red #base02, red
